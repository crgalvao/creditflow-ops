name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/backend/CreditFlow.slnx

      - name: Build
        run: dotnet build src/backend/CreditFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/backend/CreditFlow.slnx --configuration Release --no-build

      # Save the compiled backend binaries so the integration job can use them
      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-binaries
          path: src/backend/**/bin/Release/

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/creditflow-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: src/frontend/creditflow-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Save the production frontend build folder
      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: src/frontend/creditflow-web/dist/

  integration:
    name: System Integration Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Download the binaries instead of running dotnet build / pnpm build again
      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-binaries
          path: src/backend/

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/creditflow-web/dist/

      - name: Verify Local Infrastructure
        # Runs the light version: sets up containers, seeds data, verifies SQS.
        # Zero compilation happens in this job.
        run: make verify-ci
